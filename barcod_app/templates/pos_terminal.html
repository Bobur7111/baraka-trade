{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="min-h-screen bg-gray-100 flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-10 w-[600px]">

<h1 class="text-3xl font-bold text-center mb-6">
📦 POS System
</h1>

<p class="text-center text-gray-500 mb-8">
Barcode skanerlang yoki kodni kiriting
</p>

<!-- INPUT -->

<div class="flex gap-3 mb-6">

<input
id="barcodeInput"
type="text"
placeholder="Barcode kiriting..."
class="flex-1 border-2 border-gray-300 rounded-lg p-3 text-lg focus:outline-none focus:border-blue-500"
/>

<button
onclick="scanBarcode()"
class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition"
>
SCAN
</button>

</div>

<!-- RESULT -->

<div id="resultBox" class="hidden bg-green-50 border border-green-300 rounded-lg p-4 mb-6">

<h3 class="font-semibold text-green-700 mb-2">
Sotuv amalga oshdi
</h3>

<p id="productName"></p>
<p id="productPrice"></p>
<p id="productStock"></p>

</div>

<!-- ERROR -->

<div id="errorBox" class="hidden bg-red-50 border border-red-300 rounded-lg p-4 mb-6">

<p id="errorText" class="text-red-700"></p>

</div>

</div>

</div>


<script>

function scanBarcode() {

const barcode = document.getElementById("barcodeInput").value

fetch("/pos-scan/", {

method: "POST",

headers: {
"Content-Type": "application/x-www-form-urlencoded",
"X-CSRFToken": "{{ csrf_token }}"
},

body: "barcode=" + barcode

})
.then(res => res.json())
.then(data => {

document.getElementById("resultBox").classList.add("hidden")
document.getElementById("errorBox").classList.add("hidden")

if(data.error){

document.getElementById("errorBox").classList.remove("hidden")
document.getElementById("errorText").innerText = data.error

}else{

document.getElementById("resultBox").classList.remove("hidden")

document.getElementById("productName").innerText =
"Mahsulot: " + data.product

document.getElementById("productPrice").innerText =
"Narxi: " + data.price + " so'm"

document.getElementById("productStock").innerText =
"Omborda qoldi: " + data.stock

}

document.getElementById("barcodeInput").value = ""

})

}

document.getElementById("barcodeInput")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
scanBarcode()
}

})

</script>

{% endblock %}
