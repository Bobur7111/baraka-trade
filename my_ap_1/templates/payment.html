<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Baraka Market Payment</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}
.container{
    background: white;
    width: 420px;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
}
.title{
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
}
.card{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color: white;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 25px;
    position: relative;
}
.card-number{
    font-size: 20px;
    letter-spacing: 3px;
    margin-top: 15px;
}
.card-exp{
    position: absolute;
    bottom: 15px;
    right: 20px;
    font-size: 14px;
}
label{
    font-size: 14px;
    font-weight: 600;
}
input{
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin-top: 5px;
    margin-bottom: 15px;
    font-size: 14px;
    box-sizing: border-box;
}
.row{
    display: flex;
    gap: 10px;
}
.sms-btn{
    background: #2563eb;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 140px;
}
.sms-btn:hover{
    background: #1d4ed8;
}
.verify-btn{
    background: #16a34a;
    color: white;
    padding: 14px;
    border: none;
    border-radius: 10px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}
.verify-btn:hover{
    background: #15803d;
}
.timer{
    font-size: 12px;
    color: gray;
    margin-top: -10px;
    margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="container">

    <div class="title">💳 To'lov</div>

    <div>
        Summa: <b>{{ order.total_price }} so'm</b>
    </div>

    <div class="card">
        <div>Uzcard va Humo</div>
        <div class="card-number" id="cardPreview">**** **** **** ****</div>
        <div class="card-exp" id="expPreview">MM/YY</div>
    </div>

    <form method="POST" action="{% url 'verify_payment' %}">
        {% csrf_token %}

        <label>Karta raqami</label>
        <input
            type="text"
            id="cardNumber"
            name="card_number"
            placeholder="8600 1234 5678 9012"
            maxlength="19"
            required
        >

        <label>Amal qilish muddati</label>
        <input
            type="text"
            id="expDate"
            name="exp_date"
            placeholder="MM/YY"
            maxlength="5"
            required
        >

        <label>Telefon raqam</label>
        <div class="row">
            <input
                type="text"
                id="phone"
                name="phone"
                placeholder="998901234567"
                required
            >

            <button
                type="button"
                class="sms-btn"
                onclick="sendCode()"
            >
                SMS kod olish
            </button>
        </div>

        <div class="timer" id="timer"></div>

        <label>SMS kod</label>
        <input
            type="text"
            name="code"
            placeholder="6 xonali kod"
            required
        >

        <button class="verify-btn" type="submit">
            To'lovni tasdiqlash
        </button>
    </form>

</div>

<script>
const cardInput = document.getElementById("cardNumber");
const cardPreview = document.getElementById("cardPreview");

cardInput.addEventListener("input", function(){
    let value = this.value.replace(/\D/g, "");
    value = value.match(/.{1,4}/g)?.join(" ") || "";
    this.value = value;
    cardPreview.innerText = value || "**** **** **** ****";
});

const expInput = document.getElementById("expDate");
const expPreview = document.getElementById("expPreview");

expInput.addEventListener("input", function(){
    let val = this.value.replace(/\D/g, "");
    if (val.length >= 3) {
        val = val.slice(0, 2) + "/" + val.slice(2, 4);
    }
    this.value = val;
    expPreview.innerText = val || "MM/YY";
});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

async function sendCode() {
    const phone = document.getElementById("phone").value.trim();

    if (!phone) {
        alert("Telefon raqamni kiriting");
        return;
    }

    try {
        const response = await fetch("/send-payment-code/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({ phone: phone })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            alert("SMS kod yuborildi");
            startTimer();
        } else {
            alert(data.message || "SMS yuborilmadi");
            console.log("SMS error response:", data);
        }
    } catch (error) {
        console.error("SMS fetch error:", error);
        alert("Server bilan bog‘lanishda xatolik yuz berdi");
    }
}

function startTimer(){
    let time = 60;
    const timer = document.getElementById("timer");

    const interval = setInterval(() => {
        timer.innerText = "Kod qayta yuborish: " + time + "s";
        time--;

        if (time < 0) {
            clearInterval(interval);
            timer.innerText = "";
        }
    }, 1000);
}
</script>

</body>
</html>
