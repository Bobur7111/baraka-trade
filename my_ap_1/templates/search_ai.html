{% extends "base.html" %}

{% block title %}AI Image Search - Baraka Market{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto mt-12 p-6 bg-white rounded-2xl shadow-xl">
    <h2 class="text-2xl font-bold mb-4">Rasm orqali qidirish</h2>

    <form method="post" enctype="multipart/form-data" class="mb-6">
        {% csrf_token %}
        <input type="file" name="image" accept="image/*"
               class="border px-4 py-2 rounded mb-3 w-full">
        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">
            Qidirish
        </button>
    </form>

    {% if result %}
        <h3 class="text-xl font-semibold mb-3">Natijalar:</h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            {% for filename, score in result %}
            <div class="border p-2 rounded">
                <img src="{{ '/media/products/'|add:filename }}" class="w-full h-40 object-cover rounded">
                <p class="text-sm text-gray-700 mt-1">Score: {{ score|floatformat:2 }}</p>
            </div>
            {% endfor %}
        </div>
    {% endif %}
</div>
{% endblock %}
