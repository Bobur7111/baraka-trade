<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Inter;
background:#f5f7fb;
padding:40px;
}

/* CONTAINER */
.box{
max-width:800px;
margin:auto;
}

/* HEADER */
.header{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.header h2{
margin:0;
}

/* ORDER CARD */
.order{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.order:hover{
transform:translateY(-4px);
}

/* STATUS */
.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.status.new{
background:#fef3c7;
color:#92400e;
}

.status.accepted{
background:#d1fae5;
color:#065f46;
}

/* BUTTON */
.btn{
background:#2563eb;
color:white;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
font-size:13px;
}

</style>

</head>

<body>

<div class="box">

<div class="header">
<h2>📦 Mening buyurtmalarim</h2>
</div>

{% for order in orders %}

<div class="order">

<div>
<strong>#{{ order.code }}</strong><br>
<span>{{ order.restaurant.name }}</span>
</div>

<div>
<span class="status {{ order.status }}">
{{ order.status }}
</span>
</div>

<a href="/eda/receipt/{{ order.id }}/" class="btn">
Ko‘rish
</a>

</div>

{% endfor %}

</div>

</body>
</html>
