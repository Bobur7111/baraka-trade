<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
font-family:Inter;
background:#f5f7fb;
padding:40px;
}

.box{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.1);
}

.title{
font-size:26px;
font-weight:700;
margin-bottom:20px;
}

.total{
font-weight:700;
margin-bottom:20px;
font-size:18px;
}

.pay-type{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
padding:20px;
border-radius:16px;
margin-bottom:20px;
}

.input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:12px;
}

.flex{
display:flex;
gap:10px;
}

.btn{
width:100%;
padding:15px;
background:#22c55e;
border:none;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
}

.btn:disabled{
opacity:0.6;
}

.sms-btn{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
}

.otp-box{
display:flex;
gap:10px;
justify-content:center;
margin:15px 0;
}

.otp-box input{
width:45px;
height:55px;
text-align:center;
font-size:20px;
border-radius:10px;
border:1px solid #ccc;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
border:4px solid #eee;
border-top:4px solid #22c55e;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.hidden{
display:none;
}

.error{
color:red;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="box">

<div class="title">💳 To‘lov</div>
<div class="total">Summa: {{ total }} so'm</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" onsubmit="return handleSubmit()">
{% csrf_token %}

<div class="pay-type">
<label><input type="radio" name="payment_type" value="card" checked onclick="togglePayment()"> 💳 Karta</label>
<label><input type="radio" name="payment_type" value="cash" onclick="togglePayment()"> 💵 Naqd</label>
</div>

<div id="card-block">

<div class="card">Uzcard / Humo</div>

<input class="input" placeholder="8600 1234 5678 9012">

<input class="input" id="date" placeholder="MM/YY">

<div class="flex">
<input class="input" name="phone" placeholder="998901234567">
<button type="button" class="sms-btn" onclick="sendCode()">SMS</button>
</div>

<div class="otp-box">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<input type="hidden" name="otp" id="otp-hidden">

</div>

<div id="cash-info" class="hidden">
💵 Kuryerga to‘laysiz
</div>

<button class="btn" id="pay-btn">To‘lovni tasdiqlash</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Processing payment...</p>
</div>

</form>

</div>

<script>

// toggle
function togglePayment(){
let type = document.querySelector("input[name='payment_type']:checked").value;
document.getElementById("card-block").classList.toggle("hidden", type==="cash");
document.getElementById("cash-info").classList.toggle("hidden", type!=="cash");
}

// auto slash
document.getElementById("date").addEventListener("input", e=>{
let v = e.target.value.replace(/\D/g,"");
if(v.length>=2) v=v.slice(0,2)+"/"+v.slice(2,4);
e.target.value=v;
});

// OTP
const inputs=document.querySelectorAll(".otp-box input");
const hidden=document.getElementById("otp-hidden");

inputs.forEach((input,i)=>{
input.addEventListener("input",()=>{
if(input.value && i<5) inputs[i+1].focus();
hidden.value=[...inputs].map(x=>x.value).join("");
});
});

// SEND OTP
function sendCode(){
let phone=document.querySelector("input[name='phone']").value;

fetch("/send-payment-code/",{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-CSRFToken":"{{ csrf_token }}"
},
body:JSON.stringify({phone})
})
.then(res=>res.json())
.then(data=>{
alert("SMS yuborildi 🚀");

/* AUTO FILL */
if(data.code){
for(let i=0;i<inputs.length;i++){
inputs[i].value=data.code[i]||"";
}
hidden.value=data.code;
}
});
}

// submit
function handleSubmit(){
document.getElementById("pay-btn").disabled=true;
document.getElementById("loading").style.display="block";
return true;
}

</script>

</body>
</html>
