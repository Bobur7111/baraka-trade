{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baraka Market</title>

<style>

body{
font-family:Inter;
background:linear-gradient(120deg,#fdfbfb,#ebedee);
margin:0;
padding:30px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:24px;
font-weight:700;
color:#222;
}

/* BUTTON */
.btn{
background:#ff7a00;
color:white;
padding:10px 16px;
border-radius:12px;
text-decoration:none;
font-weight:600;
margin-left:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* SEARCH */
.search{
width:100%;
padding:14px;
border-radius:14px;
border:none;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
font-size:16px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

/* CARD */
.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
transition:0.3s;
text-decoration:none;
color:#222;
}

.card:hover{
transform:translateY(-6px) scale(1.02);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.card-body h3{
margin:0;
font-size:20px;
}

.card-body p{
color:#555;
margin-top:6px;
font-size:14px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">🍔 Baraka Market</div>

<div>
<a href="/eda/cart/" class="btn">🛒</a>
<a href="/eda/profile/" class="btn">👤</a>
</div>
</div>

<!-- SEARCH -->
<input id="search" class="search" placeholder="Restoran qidirish...">

<!-- GRID -->
<div class="grid" id="list">

{% for restaurant in restaurants %}

<a href="{% url 'restaurant_detail' restaurant.id %}" class="card">

<img src="{{ restaurant.image.url }}">

<div class="card-body">
<h3>{{ restaurant.name }}</h3>
<p>{{ restaurant.description|truncatechars:60 }}</p>
</div>

</a>

{% empty %}
<p>❌ Hozircha restoran yo‘q</p>
{% endfor %}

</div>

<script>

// 🔥 SEARCH
document.getElementById("search").addEventListener("input", function(){
let val = this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(val)
? "block" : "none";
});

});

</script>

</body>
</html>
