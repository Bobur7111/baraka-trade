{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Inter;
background:linear-gradient(120deg,#fdfbfb,#ebedee);
padding:30px;
}

/* CONTAINER */
.cart-container{
max-width:900px;
margin:auto;
}

/* TITLE */
h2{
margin-bottom:20px;
}

/* ITEM */
.cart-item{
display:flex;
align-items:center;
justify-content:space-between;
background:white;
padding:15px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.cart-item:hover{
transform:translateY(-3px);
}

/* IMAGE */
.cart-item img{
width:90px;
height:90px;
border-radius:12px;
object-fit:cover;
}

/* INFO */
.info{
flex:1;
margin-left:15px;
}

.price{
font-weight:700;
margin-top:5px;
color:#22c55e;
}

/* QTY */
.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty button{
width:34px;
height:34px;
border:none;
border-radius:50%;
background:#ff7a00;
color:white;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.qty button:hover{
transform:scale(1.1);
}

.qty span{
font-weight:700;
font-size:16px;
min-width:20px;
text-align:center;
}

/* REMOVE */
.remove{
background:red;
color:white;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.remove:hover{
transform:scale(1.1);
}

/* CHECKOUT */
.checkout-box{
margin-top:30px;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.total{
font-size:20px;
font-weight:700;
margin-bottom:15px;
}

.checkout-btn{
display:block;
text-align:center;
background:#22c55e;
color:white;
padding:15px;
border-radius:12px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.checkout-btn:hover{
transform:scale(1.03);
}

</style>

</head>

<body>

<div class="cart-container">

<h2>🛒 Savatcha</h2>

{% for item in items %}

<div class="cart-item" id="item-{{ item.id }}">

<img src="{{ item.food.image.url }}">

<div class="info">

<h3>{{ item.food.name }}</h3>

<div class="price">
<span id="item-total-{{ item.id }}">
{{ item.food.price|floatformat:0 }}
</span> so'm
</div>

<!-- 🔥 QUANTITY -->
<div class="qty">

<button onclick="updateQty({{ item.id }}, 'dec')">-</button>

<span id="qty-{{ item.id }}">{{ item.quantity }}</span>

<button onclick="updateQty({{ item.id }}, 'inc')">+</button>

</div>

</div>

<!-- REMOVE -->
<button class="remove" onclick="removeItem({{ item.id }})">✖</button>

</div>

{% endfor %}

<!-- TOTAL -->
<div class="checkout-box">

<div class="total">
Jami: <span id="cart-total">{{ total }}</span> so'm
</div>

<a href="{% url 'food_checkout' %}" class="checkout-btn">
To‘lovga o‘tish →
</a>

</div>

</div>

<!-- 🔥 JS -->
<script>

// UPDATE QTY
function updateQty(id, action){

fetch("/eda/update-cart/",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded",
"X-CSRFToken":"{{ csrf_token }}"
},
body:`item_id=${id}&action=${action}`
})
.then(res=>res.json())
.then(data=>{

if(data.deleted){
document.getElementById("item-"+id).remove();
updateTotal();
return;
}

// 🔥 UI UPDATE
document.getElementById("qty-"+id).innerText = data.qty;
document.getElementById("item-total-"+id).innerText = data.item_total;
document.getElementById("cart-total").innerText = data.total;

});
}

// REMOVE ITEM
function removeItem(id){

fetch("/eda/update-cart/",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded",
"X-CSRFToken":"{{ csrf_token }}"
},
body:`item_id=${id}&action=remove`
})
.then(()=>{

document.getElementById("item-"+id).remove();
updateTotal();

});
}

// BACKUP TOTAL
function updateTotal(){

let total = 0;

document.querySelectorAll("[id^='item-total-']").forEach(el=>{
total += parseInt(el.innerText) || 0;
});

document.getElementById("cart-total").innerText = total;

}

</script>

</body>
</html>
