<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
font-family:Inter;
background:#0f172a;
color:white;
padding:30px;
}

/* GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.food{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:16px;
transition:0.3s;
}

.food:hover{
transform:translateY(-5px);
}

.food img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.btn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
cursor:pointer;
}

.add{
background:#ff7a00;
}

.order{
background:#22c55e;
}

</style>
</head>

<body>

<h1>{{ restaurant.name }}</h1>

<div class="menu">

{% for food in foods %}
<div class="food">

<img src="{{ food.image.url }}">

<h3>{{ food.name }}</h3>
<p>{{ food.price }} so'm</p>

<a href="{% url 'add_food_to_cart' food.id %}">
<button class="btn add">Qo‘shish</button>
</a>

<form action="{% url 'add_food_to_cart' food.id %}" method="get">
    <button type="submit">Savatga qo‘shish</button>
</form>
<button class="btn order">Buyurtmalarga qaytish</button>
</a>

</div>
{% endfor %}

</div>

</body>
</html>
