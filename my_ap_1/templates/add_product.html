{% extends 'base.html' %}

{% block content %}

<div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-lg">

    <h1 class="text-2xl font-bold mb-4">Yangi mahsulot qo‘shish</h1>

    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Mahsulot nomi"
               class="w-full border p-3 rounded-xl">

        <input type="number" name="price" placeholder="Narxi"
               class="w-full border p-3 rounded-xl">

        <input type="number" name="stock" placeholder="Stock"
               class="w-full border p-3 rounded-xl">

        <select name="category" class="w-full border p-3 rounded-xl">
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name_uz }}</option>
            {% endfor %}
        </select>

        <input type="file" name="image"
               class="w-full border p-3 rounded-xl">

        <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-xl">
            Saqlash
        </button>
    </form>

</div>

{% endblock %}
