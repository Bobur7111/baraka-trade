{% extends 'base.html' %}

{% block title %}Product Delete | Baraka Market{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto bg-white rounded-3xl shadow-xl p-6 text-center">

    <h1 class="text-3xl font-bold text-red-600 mb-4">
        🗑 Mahsulotni o‘chirish
    </h1>

    <p class="text-gray-700 mb-6">
        Rostdan ham <b>{{ product.name_uz }}</b> mahsulotini o‘chirmoqchimisiz?
    </p>

    {% if product.image %}
        <img src="{{ product.image.url }}"
             class="w-40 h-40 object-cover rounded-2xl mx-auto mb-5">
    {% endif %}

    <form method="post" class="flex gap-3 justify-center">
        {% csrf_token %}

        <button type="submit"
                class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl font-bold">
            Ha, o‘chirish
        </button>

        <a href="{% url 'my_products' %}"
           class="bg-gray-700 hover:bg-gray-800 text-white px-6 py-3 rounded-2xl font-bold">
            Bekor qilish
        </a>
    </form>

</div>

{% endblock %}
